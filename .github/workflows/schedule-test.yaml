name: Schedule Test

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schedule-test:
    runs-on: ubuntu-latest

    steps:
      - name: Print trigger info
        run: |
          echo "Schedule test fired"
          echo "Event name: $GITHUB_EVENT_NAME"
          echo "UTC time: $(date -u)"
